# Original author: jackwener | License: Apache-2.0
site: antigravity
name: serve
description: Check if Antigravity is being served / accessible
domain: localhost
strategy: ui
browser: true

columns: [Status, Url, Title]

pipeline:
  - evaluate: |
      (function() {
        return [{ Status: 'Connected', Url: window.location.href, Title: document.title }];
      })()
