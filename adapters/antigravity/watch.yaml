# Original author: jackwener | License: Apache-2.0
site: antigravity
name: watch
description: Watch for new messages in Antigravity conversation
domain: localhost
strategy: ui
browser: true

columns: [Status, Messages]

pipeline:
  - evaluate: |
      (function() {
        const msgs = document.querySelectorAll('[data-message-role], [class*="message"], [class*="bubble"]');
        return [{ Status: 'Watching', Messages: msgs.length }];
      })()
