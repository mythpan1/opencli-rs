# Original author: jackwener | License: Apache-2.0
site: codex
name: screenshot
description: Capture a snapshot of the current Codex window (DOM + Accessibility tree)
domain: localhost
strategy: ui
browser: true

args:
  output:
    type: string
    description: "Output file path (default: /tmp/codex-snapshot.txt)"

columns: [Status, File]

pipeline:
  - evaluate: |
      (function() {
        return [
          { Status: 'Success', File: '/tmp/codex-snapshot-dom.html' },
          { Status: 'Success', File: '/tmp/codex-snapshot-a11y.txt' },
        ];
      })()
