name: Sync with upstream
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add upstream remote
        run: git remote add upstream https://github.com/nashsu/opencli-rs.git && git fetch upstream
      - name: Sync with upstream
        run: git checkout main && git merge upstream/main --ff-only || echo "Already up to date"
      - name: Push to fork
        run: git push
